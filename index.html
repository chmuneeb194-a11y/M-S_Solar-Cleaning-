<!DOCTYPE html>
<html lang="ur-en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M S Solar Cleaning | Sahiwal Professional Solar Maintenance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>html { scroll-behavior: smooth; }</style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <span class="text-2xl font-bold text-blue-900">M S Solar<span class="text-yellow-500"> Cleaning</span></span>
            <a href="#calculator" class="bg-green-500 text-white px-5 py-2.5 rounded-full font-semibold">Calculate & Book</a>
        </div>
    </header>

    <!-- Hero Section (Cleaned) -->
    <section id="home" class="bg-blue-900 text-white py-20 px-4 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-6">Gande Solar Panels?<br><span class="text-yellow-400">25% Tak Bijli Ka Nuqsaan!</span></h1>
        <p class="text-xl text-gray-300">Ab aapke apne shehar Sahiwal mein - Professional solar cleaning service.</p>
    </section>

    <!-- Calculator Section -->
    <section id="calculator" class="py-16 px-4">
        <div class="container mx-auto max-w-xl bg-white p-8 rounded-3xl shadow-xl">
            <h2 class="text-2xl font-bold text-center mb-6">Live Price Calculator</h2>
            
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-600 mb-2">Solar Panels Ki Tadad</label>
                <div class="flex items-center space-x-3">
                    <button type="button" onclick="changePanels(-1)" class="bg-blue-900 text-white w-12 h-12 rounded-xl">-</button>
                    <input type="number" id="panel-qty" value="8" min="1" oninput="calculateBill()" class="w-full text-center border p-3 rounded-xl font-bold text-xl">
                    <button type="button" onclick="changePanels(1)" class="bg-blue-900 text-white w-12 h-12 rounded-xl">+</button>
                </div>
            </div>

            <!-- Blower Toggle -->
            <div class="mb-6 flex items-center p-4 bg-gray-100 rounded-xl">
                <input type="checkbox" id="blower-check" onchange="calculateBill()" class="w-6 h-6 mr-3">
                <label for="blower-check" class="font-bold">Add Inverter Blower Service (+Rs. 500)</label>
            </div>

            <div class="bg-blue-900 text-white p-5 rounded-2xl text-center">
                <p class="text-yellow-400 font-bold">Total Estimated Cost</p>
                <div class="text-4xl font-black">Rs. <span id="total-price">1140</span></div>
            </div>
            
            <button onclick="sendBooking()" class="w-full mt-6 bg-green-500 text-white font-bold py-4 rounded-xl">WhatsApp Booking</button>
        </div>
    </section>

    <script>
        function changePanels(amount) {
            var qtyInput = document.getElementById("panel-qty");
            var currentVal = parseInt(qtyInput.value) || 0;
            var newVal = currentVal + amount;
            if (newVal < 1) newVal = 1;
            qtyInput.value = newVal;
            calculateBill();
        }

        function calculateBill() {
            var panels = parseInt(document.getElementById("panel-qty").value) || 0;
            var blower = document.getElementById("blower-check").checked ? 500 : 0;
            var total = (panels * 80) + blower; // Rate @ 80
            document.getElementById("total-price").innerText = total;
        }

        function sendBooking() {
            var phoneNumber = "923084462121";
            var qty = document.getElementById("panel-qty").value;
            var blowerStatus = document.getElementById("blower-check").checked ? "Yes" : "No";
            var finalPrice = document.getElementById("total-price").innerText;
            var url = "https://wa.me/" + phoneNumber + "?text=Booking Request:%0A- Panels: " + qty + "%0A- Blower Service: " + blowerStatus + "%0A- Total Bill: Rs. " + finalPrice;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
